<!DOCTYPE html>
<html>
<head>
<title>Result</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<section class="result">
<h2>Prediction Result</h2>

<img src="{{ image_path }}" width="300">

<h3>Disease: {{ prediction }}</h3>
<h4>Confidence: {{ confidence }}%</h4>
<p>Confidence: {{ confidence }}%</p>

<div style="width: 300px; background: #ddd;">
  <div style="width: {{ confidence }}%; background: green; color:white;">
    {{ confidence }}%
  </div>
</div>

<a href="{{ url_for('predict') }}">
<button>Try Another</button>
</a>

</section>

</body>
</html>
